name: release

# Build ccswitch for every supported platform and attach the binaries to a
# GitHub Release whenever you push a version tag, e.g.:
#
#   git tag v0.1.3
#   git push origin v0.1.3
#
# The Windows asset stays named ccswitch.exe so install.ps1 keeps working; the
# macOS and Linux binaries carry a platform suffix.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: windows, goarch: amd64, out: ccswitch.exe }
          - { goos: darwin,  goarch: arm64, out: ccswitch-darwin-arm64 }
          - { goos: darwin,  goarch: amd64, out: ccswitch-darwin-amd64 }
          - { goos: linux,   goarch: amd64, out: ccswitch-linux-amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build ${{ matrix.out }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags "-s -w" -o "${{ matrix.out }}" ./cmd/ccswitch

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: ${{ matrix.out }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
